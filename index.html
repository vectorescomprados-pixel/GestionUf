<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
    <title>GestiónUF Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body class="dark-mode">
    <div class="wrap">
        <div class="mode-container">
            <span id="mode-text">Modo Oscuro</span>
            <label class="switch">
                <input type="checkbox" id="mode-toggle" checked>
                <span class="slider"></span>
            </label>
        </div>

        <div id="login-screen" class="card">
            <h1>GestiónUF</h1>
            <input id="login-user" placeholder="Usuario">
            <input id="login-pass" type="password" placeholder="Contraseña">
            <div class="grid-btns">
                <button id="btn-login" class="btn primary">Entrar</button>
                <button id="btn-demo" class="btn">Demo</button>
            </div>
            <button id="btn-recover" class="btn ghost" style="width:100%">Recuperar contraseña</button>
            <p id="login-msg" style="color:#ef4444; font-size: 0.8em; margin-top: 10px;"></p>
        </div>

        <div id="main-screen" class="card hidden">
            <header>
                <h2>Panel de Control</h2>
                <p class="muted">Usuario: <span id="current-user"></span></p>
            </header>

            <div class="grid-btns">
                <button id="btn-logout" class="btn danger">Salir</button>
                <button id="btn-register-user" class="btn">Nuevo Usuario</button>
                <button id="btn-import" class="btn">Importar CSV</button>
                <button id="btn-export" class="btn">Exportar CSV</button>
            </div>

            <section class="search-section">
                <input id="search-text" placeholder="Buscar UF, nombre o tel...">
                <div class="grid-btns">
                    <button id="btn-search" class="btn primary">Buscar</button>
                    <button id="btn-clear" class="btn">Ver Todo</button>
                </div>
            </section>

            <button id="btn-add" class="btn primary" style="margin: 15px 0; width: 100%;">+ AGREGAR REGISTRO</button>

            <div class="grid-btns">
                <button id="btn-list" class="btn">Listar Todos</button>
                <button id="btn-empty" class="btn">Ver Vacíos</button>
            </div>
            <button id="btn-delete-db" class="btn danger" style="width: 100%; margin-top: 10px;">BORRAR BASE DE DATOS</button>

            <div id="list"></div>
        </div>
    </div>

    <div id="modal-form" class="modal hidden">
        <div class="modal-content card">
            <h3 id="modal-title">Datos del Registro</h3>
            <div class="form-body">
                <input id="f-uf" placeholder="Unidad Funcional (Ej: 5B)">
                <input id="f-prop" placeholder="Nombre Propietario">
                <input id="f-telp" placeholder="Teléfono Propietario">
                <input id="f-inq" placeholder="Nombre Inquilino">
                <input id="f-teli" placeholder="Teléfono Inquilino">
            </div>
            <div class="grid-btns" style="margin-top: 15px;">
                <button id="btn-save" class="btn primary">Guardar</button>
                <button id="btn-cancel" class="btn danger">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
