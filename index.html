<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
    <title>GestiónUF Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="dark-mode">
    <input type="file" id="csv-file" accept=".csv" style="display:none">

    <div class="wrap">
        <div class="top-controls">
            <div class="control-group">
                <span>Ver Log</span>
                <label class="switch"><input type="checkbox" id="log-toggle" checked><span class="slider"></span></label>
            </div>
            <div class="control-group">
                <span>Modo Oscuro</span>
                <label class="switch"><input type="checkbox" id="mode-toggle" checked><span class="slider"></span></label>
            </div>
        </div>

        <div id="login-screen" class="card">
            <h1>GestiónUF</h1>
            <input id="login-user" placeholder="Usuario">
            <input id="login-pass" type="password" placeholder="Contraseña">
            <button id="btn-login" class="btn primary" style="width:100%">Entrar</button>
            <button id="btn-recover" class="btn ghost" style="width:100%; margin-top: 15px;">Recuperar Acceso</button>
        </div>

        <div id="main-screen" class="card hidden">
            <header>
                <h2>Panel de Control</h2>
                <p class="muted">Usuario: <span id="current-user-display" style="font-weight:bold; color:var(--primary)"></span></p>
            </header>
            
            <div class="grid-btns">
                <button id="btn-logout" class="btn danger">Salir</button>
                <button id="btn-manage-users" class="btn admin-only">Cuentas</button>
                <button id="btn-import" class="btn admin-only">Importar</button>
                <button id="btn-export" class="btn admin-only">Exportar</button>
            </div>

            <section class="search-section">
                <input id="search-text" placeholder="Buscar UF, nombre o tel...">
                <div class="grid-btns">
                    <button id="btn-search" class="btn primary">Buscar</button>
                    <button id="btn-clear" class="btn">Limpiar</button>
                </div>
            </section>

            <button id="btn-add" class="btn primary" style="margin: 10px 0; width:100%">+ AGREGAR REGISTRO</button>

            <div class="grid-btns">
                <button id="btn-list" class="btn">Listar Todos</button>
                <button id="btn-empty" class="btn">Ver Vacíos</button>
            </div>

            <div id="progress-container" class="hidden" style="margin: 10px 0; background: var(--border); border-radius: 10px; height: 12px; overflow: hidden;">
                <div id="progress-bar" style="background: var(--primary); width: 0%; height: 100%; transition: width 0.1s;"></div>
            </div>
            <div id="progress-text" class="hidden" style="font-size: 10px; text-align: center; margin-bottom: 5px;">Procesando...</div>
            
            <div id="list"></div>

            <div id="log-container" class="log-container">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:5px">
                    <h4 class="muted">Actividad de Hoy</h4>
                    <button id="btn-export-log" class="btn admin-only" style="padding:4px 8px; font-size:10px">Bajar Log</button>
                </div>
                <div id="log-list"></div>
            </div>

            <div class="grid-btns admin-only" style="margin-top:15px;">
                <button id="btn-restore" class="btn" style="background: #0ea5e9; color: white;">Restaurar Respaldo</button>
                <button id="btn-delete-db" class="btn danger">BORRAR BASE</button>
            </div>
        </div>
    </div>

    <div id="modal-form" class="modal hidden">
        <div class="modal-content card">
            <h3>Datos de Unidad</h3>
            <input id="f-uf" placeholder="Unidad Funcional">
            <input id="f-prop" placeholder="Propietario">
            <input id="f-telp" placeholder="Tel Propietario">
            <input id="f-inq" placeholder="Inquilino">
            <input id="f-teli" placeholder="Tel Inquilino">
            <div class="grid-btns">
                <button id="btn-save" class="btn primary">Guardar</button>
                <button id="btn-cancel" class="btn danger">Cancelar</button>
            </div>
        </div>
    </div>

    <div id="modal-users-list" class="modal hidden">
        <div class="modal-content card" style="max-width:400px; width:90%">
            <h3>Gestión de Cuentas</h3>
            <div id="users-admin-list" style="max-height:150px; overflow-y:auto; margin-bottom:10px"></div>
            <hr>
            <input id="u-name" placeholder="Nuevo Usuario">
            <input id="u-pass" type="password" placeholder="Nueva Clave">
            <select id="u-role"><option value="user">Usuario</option><option value="admin">Admin</option></select>
            <div class="grid-btns">
                <button id="btn-save-user" class="btn primary">Crear</button>
                <button id="btn-close-users" class="btn danger">Cerrar</button>
            </div>
        </div>
    </div>

    <div id="modal-recover" class="modal hidden">
        <div class="modal-content card" style="max-width: 350px;">
            <h3>Recuperar Admin</h3>
            <input id="recover-phone" type="tel" placeholder="Celular Maestro">
            <div id="recover-step-2" class="hidden">
                <input id="new-admin-pass" type="password" placeholder="Nueva Clave Admin">
            </div>
            <div class="grid-btns">
                <button id="btn-verify-phone" class="btn primary">Verificar</button>
                <button id="btn-close-recover" class="btn danger">Cerrar</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
